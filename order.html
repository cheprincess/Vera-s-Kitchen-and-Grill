<!DOCTYPE html>
<html>
<head>
    <title>Order - Melly's Kitchen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
            color: white;
            background: url('https://images.unsplash.com/photo-1544025162-d76694265947?w=1600') no-repeat center fixed;
            background-size: cover;
        }
        nav {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            text-align: center;
            margin: -30px -30px 30px -30px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
        }
        nav a:hover { color: #e63946; }
        table {
            border-collapse: collapse;
            width: 60%;
            background-color: rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        th {
            background-color: #1d3557;
            padding: 12px;
        }
        td {
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px;
        }
        input, select {
            margin: 5px 0;
            padding: 8px;
            width: 250px;
        }
        input[type="submit"] {
            background-color: #1d3557;
            color: white;
            border: none;
            cursor: pointer;
            width: 120px;
        }
    </style>
    <script>
        function addOrder() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let meal = document.getElementById("meal").value;
            let quantity = document.getElementById("quantity").value;

            let table = document.getElementById("orderTable");
            let row = table.insertRow(-1);
            row.insertCell(0).innerText = name;
            row.insertCell(1).innerText = email;
            row.insertCell(2).innerText = meal;
            row.insertCell(3).innerText = quantity;

            document.getElementById("latestOrder").innerText =
                "Last Order: " + name + " ordered " + quantity + " x " + meal;

            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("meal").value = "Grilled Chicken";
            document.getElementById("quantity").value = "";

            return false;
        }
    </script>
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="order.html">Order</a>
</nav>

<h2>Customer Orders</h2>
<table id="orderTable">
    <tr><th>Customer Name</th><th>Email</th><th>Meal Ordered</th><th>Quantity</th></tr>
</table>

<h2>Place Your Order</h2>
<form onsubmit="return addOrder()">
    Name:<br><input type="text" id="name" required><br>
    Email:<br><input type="email" id="email" required><br>
    Select Meal:<br>
    <select id="meal">
        <option>Grilled Chicken</option>
        <option>Beef Steak</option>
        <option>Fries</option>
        <option>Juice</option>
    </select><br>
    Quantity:<br><input type="number" id="quantity" required><br>
    <input type="submit" value="Submit Order">
</form>

<h2>Latest Order</h2>
<div id="latestOrder"></div>
</body>
</html>
